<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management CRUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .user-list {
            list-style: none;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-info h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .user-info p {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit {
            background: #22c55e;
            padding: 0.5rem 1rem;
            width: auto;
        }

        .btn-delete {
            background: #ef4444;
            padding: 0.5rem 1rem;
            width: auto;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-item {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Directory</h1>

        <div class="card">
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" placeholder="Enter name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" placeholder="Enter age" required>
                </div>
                <button type="submit" id="submitBtn">Add User</button>
                <button type="button" id="cancelBtn" style="display:none; background: #64748b; margin-top: 0.5rem;">Cancel Edit</button>
            </form>
        </div>

        <div class="card">
            <ul class="user-list" id="userList">
                <!-- Users will be loaded here -->
            </ul>
        </div>
    </div>

    <script>
        const userForm = document.getElementById('userForm');
        const userList = document.getElementById('userList');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        let isEditing = false;

        // Fetch and display users
        async function fetchUsers() {
            const res = await fetch('/users');
            const users = await res.json();
            userList.innerHTML = users.map(user => `
                <li class="user-item">
                    <div class="user-info">
                        <h3>${user.name}</h3>
                        <p>${user.email} • ${user.age} years old</p>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editUser('${user._id}', '${user.name}', '${user.email}', ${user.age})">Edit</button>
                        <button class="btn-delete" onclick="deleteUser('${user._id}')">Delete</button>
                    </div>
                </li>
            `).join('');
        }

        // Handle form submit (Create or Update)
        userForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: parseInt(document.getElementById('age').value)
            };

            if (isEditing) {
                await fetch(`/users/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                resetForm();
            } else {
                await fetch('/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
            }

            userForm.reset();
            fetchUsers();
        });

        // Delete user
        async function deleteUser(id) {
            if (confirm('Are you sure?')) {
                await fetch(`/users/${id}`, { method: 'DELETE' });
                fetchUsers();
            }
        }

        // Setup edit mode
        function editUser(id, name, email, age) {
            isEditing = true;
            document.getElementById('userId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('email').value = email;
            document.getElementById('age').value = age;
            submitBtn.textContent = 'Update User';
            cancelBtn.style.display = 'block';
        }

        function resetForm() {
            isEditing = false;
            document.getElementById('userId').value = '';
            submitBtn.textContent = 'Add User';
            cancelBtn.style.display = 'none';
        }

        cancelBtn.onclick = () => {
            userForm.reset();
            resetForm();
        };

        // Initial load
        fetchUsers();
    </script>
</body>
</html>
